# ──────────────────────────────────────────────────────────────────────────────
# VM1 — Client (React SPA served by Nginx)
#
# The SPA runs in the user's browser, so the server URL it calls is baked in at
# BUILD time (Vite). That URL must be the server's PUBLIC address (VM2), because
# the browser — not this container — makes the API calls.
#
# Run:  cp ../.env.example .env   # set SERVER_PUBLIC_URL
#       docker compose up -d --build
#
# TLS: this serves plain HTTP on :80. Put a reverse proxy / load balancer
# (Caddy, Nginx, or your cloud LB) in front for HTTPS on the public domain.
# ──────────────────────────────────────────────────────────────────────────────

name: mailora-vm1-client

services:
  client:
    build:
      context: ../../client
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${SERVER_PUBLIC_URL}
        VITE_API_URL: ${SERVER_PUBLIC_URL}
    ports:
      - "80:80"
    restart: unless-stopped
