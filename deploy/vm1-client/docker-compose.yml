# ──────────────────────────────────────────────────────────────────────────────
# VM1 — Client (React SPA) — HTTPS (self-signed) + CI/CD-safe
#
# Caddy terminates TLS on :443 using a self-signed cert generated on the VM.
# The cert lives OUTSIDE the git workspace at /opt/mailora/certs so the CD
# runner's `git clean` on checkout can never delete it (bind-mounted by ABSOLUTE
# path below). The Caddyfile IS tracked in git and restored on every deploy.
#
# Accessed via https://<VM1-IP> (no domain) — see Caddyfile (listens on bare
# ports). Browsers show a "not trusted" warning (self-signed) — expected.
#
# The SPA calls the server from the browser, so SERVER_PUBLIC_URL is baked in at
# BUILD time and must be VM2's public HTTPS url.
#
# One-time on the VM (see deploy/DEPLOY_VM1.md):
#   sudo mkdir -p /opt/mailora/certs
#   sudo openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#     -keyout /opt/mailora/certs/key.pem -out /opt/mailora/certs/cert.pem \
#     -subj "/CN=<VM1-IP>" -addext "subjectAltName=IP:<VM1-IP>"
# ──────────────────────────────────────────────────────────────────────────────

name: mailora-vm1-client

services:
  client:
    build:
      context: ../../client
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${SERVER_PUBLIC_URL}
        VITE_API_URL: ${SERVER_PUBLIC_URL}
    # Internal only — Caddy is the public front door.
    expose:
      - "80"
    restart: unless-stopped

  # ─── Caddy — HTTPS front door using the self-signed cert ─────────────────────
  caddy:
    image: caddy:2-alpine
    depends_on:
      - client
    ports:
      - "80:80"     # public — HTTP→HTTPS redirect
      - "443:443"   # public — HTTPS (self-signed)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro      # tracked in git
      - /opt/mailora/certs:/certs:ro             # persists across CD checkouts
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
