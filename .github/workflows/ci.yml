# ──────────────────────────────────────────────────────────────────────────────
# Mailora 2.0 CI/CD Pipeline — GitHub Actions
#
# Triggers: Push to main/develop, Pull requests
# Jobs:
#   1. Lint & Test with Coverage (server)
#   2. Build Check (client)
#   3. Docker Build Verification
# ──────────────────────────────────────────────────────────────────────────────

name: Mailora CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Server: Lint + Test + Coverage ────────────────────────────────────────
  server-test:
    name: Server Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        env:
          JWT_SECRET: ci-test-jwt-secret
          EMAIL_ENCRYPTION_KEY: ci-test-encryption-key
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/lcov-report
          retention-days: 14

  # ─── Client: Build Check ─────────────────────────────────────────────────
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ─── Docker Build Verification ───────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [server-test, client-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build server Docker image
        run: |
          docker build -f server/Dockerfile -t mailora-server:ci .

      - name: Build client Docker image
        run: |
          docker build -f client/Dockerfile -t mailora-client:ci client/

      - name: Verify images built
        run: |
          docker images mailora-server:ci
          docker images mailora-client:ci
          echo "Docker images built and verified successfully"
